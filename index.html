<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BMI project</title>
</head>
<body>
    <div class="SectionHeader">
        <h2>BMI CALCULATOR</h2>
        <p>By EXCEL</p>
    </div>
    
    <div class="calculatorSection">
        <div class="calculator">
            <form action="">
                <div>
                    <label for="Firstname">Firstname</label>
                    <input type="text" id="Firstname">
                </div>

                <div>
                    <label for="Lastname">Lastname</label>
                    <input type="text" id="Lastname">
                </div>

                <div>
                    <label for="weight">Mass</label>
                    <input type="number" name="" id="mass" placeholder="Enter mass in kg">
                </div>

                <div>
                    <label for="Height">Height</label>
                    <input type="number" name="" id="Height" placeholder="Enter height in meters">
                </div>
            </form>

            <div class="btnDiv">
                <button class="btn">Calculate BMI</button>
            </div>
        </div>

    </div>
    <div class="result">
         <p class="Result">YOUR BMI VALUE IS.....</p>
    </div>
  <script src="script.js"></script>  
</body> 
</html>
